<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Red circle -->
  <circle cx="60" cy="60" r="54" stroke="#DC2626" stroke-width="6" fill="#FEE2E2" fill-opacity="0.3"/>
  <!-- Perfume bottle -->
  <g transform="translate(35, 18)">
    <!-- Spray nozzle -->
    <rect x="19" y="0" width="12" height="8" rx="2" fill="#9CA3AF" stroke="#6B7280" stroke-width="1.5"/>
    <!-- Spray button -->
    <rect x="22" y="-4" width="6" height="6" rx="1" fill="#6B7280"/>
    <!-- Bottle neck -->
    <rect x="17" y="8" width="16" height="10" rx="1" fill="#D1D5DB" stroke="#9CA3AF" stroke-width="1.5"/>
    <!-- Bottle body -->
    <rect x="8" y="18" width="34" height="52" rx="6" fill="#C084FC" stroke="#A855F7" stroke-width="2"/>
    <!-- Liquid level -->
    <rect x="10" y="38" width="30" height="30" rx="4" fill="#A855F7" fill-opacity="0.4"/>
    <!-- Label -->
    <rect x="14" y="28" width="22" height="16" rx="2" fill="white" fill-opacity="0.5"/>
    <!-- Spray mist lines -->
    <path d="M36 6 Q44 2 42 -2" stroke="#D1D5DB" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M36 8 Q46 6 44 2" stroke="#D1D5DB" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M36 10 Q48 10 46 6" stroke="#D1D5DB" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  </g>
  <!-- Red diagonal prohibition line -->
  <line x1="21" y1="21" x2="99" y2="99" stroke="#DC2626" stroke-width="6" stroke-linecap="round"/>
</svg>