<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Red circle -->
  <circle cx="60" cy="60" r="54" stroke="#DC2626" stroke-width="6" fill="#FEE2E2" fill-opacity="0.3"/>
  <!-- Gum/candy icon -->
  <g transform="translate(30, 32)">
    <!-- Gum stick wrapper -->
    <rect x="8" y="12" width="44" height="32" rx="4" fill="#60A5FA" stroke="#3B82F6" stroke-width="2"/>
    <!-- Wrapper fold lines -->
    <line x1="18" y1="12" x2="18" y2="44" stroke="#3B82F6" stroke-width="1.5" stroke-dasharray="3 2"/>
    <line x1="42" y1="12" x2="42" y2="44" stroke="#3B82F6" stroke-width="1.5" stroke-dasharray="3 2"/>
    <!-- Wrapper ends -->
    <path d="M8 20 L0 14 L0 42 L8 36" fill="#93C5FD" stroke="#3B82F6" stroke-width="1.5"/>
    <path d="M52 20 L60 14 L60 42 L52 36" fill="#93C5FD" stroke="#3B82F6" stroke-width="1.5"/>
    <!-- Label on gum -->
    <rect x="22" y="22" width="16" height="12" rx="2" fill="white" fill-opacity="0.6"/>
  </g>
  <!-- Red diagonal prohibition line -->
  <line x1="21" y1="21" x2="99" y2="99" stroke="#DC2626" stroke-width="6" stroke-linecap="round"/>
</svg>