<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <rect x="4" y="4" width="112" height="112" rx="16" fill="#22C55E"/>
  <!-- Paper towel roll -->
  <ellipse cx="70" cy="35" rx="8" ry="14" fill="white" fill-opacity="0.8" stroke="white" stroke-width="1.5"/>
  <rect x="40" y="22" width="30" height="28" rx="3" fill="white"/>
  <!-- Paper coming off roll -->
  <path d="M40 35 Q30 35 25 42 L20 52 Q18 58 22 62 L35 70 Q42 74 48 70 L55 62" fill="white" fill-opacity="0.9" stroke="white" stroke-width="1.5"/>
  <!-- Hand with paper -->
  <path d="M30 72 Q25 62 38 56 L55 48 Q65 44 72 52 L76 58 Q80 68 72 76 L55 85 Q38 90 30 72Z" fill="white"/>
  <!-- Fingers -->
  <path d="M38 56 Q33 46 37 40" stroke="white" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M48 50 Q47 40 50 35" stroke="white" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Motion waves showing drying -->
  <g stroke="white" stroke-width="2" opacity="0.5" fill="none" stroke-linecap="round">
    <path d="M80 55 Q86 52 80 48"/>
    <path d="M84 58 Q92 54 84 48"/>
    <path d="M88 62 Q98 56 88 50"/>
  </g>
  <!-- Step number -->
  <circle cx="95" cy="95" r="14" fill="white"/>
  <text x="95" y="101" text-anchor="middle" fill="#22C55E" font-size="18" font-weight="bold" font-family="Arial, sans-serif">5</text>
</svg>